<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recruiting ATS">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="briefcaseShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="2" y="2" width="508" height="508" rx="110" ry="110" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Briefcase mark -->
  <g filter="url(#softShadow)">
    <!-- Handle -->
    <path d="M 200 152 H 312 A 16 16 0 0 1 328 168 V 200 H 296 V 184 H 216 V 200 H 184 V 168 A 16 16 0 0 1 200 152 Z"
          fill="url(#briefcaseShine)"/>
    <!-- Body -->
    <rect x="128" y="200" width="256" height="184" rx="20" ry="20" fill="url(#briefcaseShine)"/>
    <!-- Latch / center divider -->
    <rect x="232" y="278" width="48" height="28" rx="6" ry="6" fill="#6366F1" opacity="0.85"/>
    <!-- Belt line -->
    <rect x="128" y="276" width="256" height="3" fill="#6366F1" opacity="0.18"/>
  </g>

  <!-- Accent dot — "active match" -->
  <circle cx="376" cy="160" r="32" fill="#10B981" stroke="#FFFFFF" stroke-width="6"/>
  <path d="M 364 160 L 372 168 L 388 152" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
