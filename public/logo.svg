<svg width="640" height="160" viewBox="0 0 640 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recruiting ATS">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="briefcaseShineL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(20, 20)">
    <rect width="120" height="120" rx="26" ry="26" fill="url(#bgL)"/>
    <g transform="translate(0,0) scale(0.234)">
      <!-- Handle -->
      <path d="M 200 152 H 312 A 16 16 0 0 1 328 168 V 200 H 296 V 184 H 216 V 200 H 184 V 168 A 16 16 0 0 1 200 152 Z"
            fill="url(#briefcaseShineL)"/>
      <!-- Body -->
      <rect x="128" y="200" width="256" height="184" rx="20" ry="20" fill="url(#briefcaseShineL)"/>
      <!-- Latch -->
      <rect x="232" y="278" width="48" height="28" rx="6" ry="6" fill="#6366F1" opacity="0.85"/>
      <!-- Belt -->
      <rect x="128" y="276" width="256" height="3" fill="#6366F1" opacity="0.18"/>
    </g>
    <!-- Accent dot -->
    <circle cx="93" cy="27" r="11" fill="#10B981" stroke="#FFFFFF" stroke-width="2.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(168, 0)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Arial, sans-serif" font-weight="700">
    <text x="0" y="74" font-size="42" fill="#0F172A" letter-spacing="-1">Recruiting</text>
    <text x="0" y="118" font-size="42" fill="#6366F1" letter-spacing="-1">ATS</text>
  </g>
</svg>
